<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>历史统计 - 运动腰带控制系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #6b8e23 0%, #b8860b 100%);
            color: #fff;
            overflow-x: hidden;
            padding-top: 54px;
        }

        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 54px;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.12);
        }

        .nav-btn {
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.12);
            color: #fff;
            padding: 8px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
        }

        .nav-title {
            font-weight: 700;
            letter-spacing: 0.5px;
            font-size: 16px;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
            padding: 16px;
            display: grid;
            gap: 14px;
        }

        .card {
            background: rgba(0,0,0,0.22);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.18);
        }

        .card-title {
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
        }

        .pill-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .pill {
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.1);
            color: #fff;
            padding: 7px 10px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 13px;
            transition: transform 0.1s ease, background 0.15s ease;
        }

        .pill:active { transform: scale(0.98); }
        .pill.active {
            background: rgba(0,255,136,0.18);
            border-color: rgba(0,255,136,0.35);
        }

        .grid {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .stat {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 12px;
            padding: 10px 12px;
        }

        .stat-label {
            opacity: 0.8;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .stat-value {
            font-weight: 800;
            font-size: 18px;
            color: #00ff88;
        }

        .stat-value.secondary { color: #2ecc71; }
        .stat-value.muted { color: #ffffff; opacity: 0.92; }

        .chart-wrap {
            position: relative;
            height: 320px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 10px;
        }

        .chart-wrap.small { height: 240px; }

        .row {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .select {
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(0,0,0,0.18);
            color: #fff;
            padding: 10px 12px;
            border-radius: 12px;
            width: 100%;
            font-size: 14px;
            outline: none;
        }

        @media (min-width: 760px) {
            .grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
            .chart-wrap { height: 360px; }
        }
    </style>
</head>
<body>
    <div class="top-nav">
        <button class="nav-btn" onclick="location.href='/'">← 返回主页</button>
        <div class="nav-title">历史统计</div>
        <button class="nav-btn" onclick="refreshAll()">刷新</button>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-title">
                <span>累计趋势</span>
                <span style="opacity: 0.8; font-size: 12px;" id="rangeHint">最近14天</span>
            </div>

            <div class="row">
                <div class="pill-group" id="rangeGroup">
                    <button class="pill" data-days="7">7天</button>
                    <button class="pill active" data-days="14">14天</button>
                    <button class="pill" data-days="30">30天</button>
                </div>
                <div class="pill-group" id="metricGroup">
                    <button class="pill active" data-metric="step">步数</button>
                    <button class="pill" data-metric="time">时长</button>
                    <button class="pill" data-metric="carbon">减碳</button>
                </div>
            </div>

            <div class="chart-wrap">
                <canvas id="trendChart"></canvas>
            </div>

            <div class="grid" style="margin-top: 12px;">
                <div class="stat">
                    <div class="stat-label">总步数</div>
                    <div class="stat-value" id="sumSteps">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">总时长</div>
                    <div class="stat-value muted" id="sumTime">0分</div>
                </div>
                <div class="stat">
                    <div class="stat-label">总减碳</div>
                    <div class="stat-value secondary" id="sumCarbon">0g</div>
                </div>
                <div class="stat">
                    <div class="stat-label">日均步数</div>
                    <div class="stat-value" id="avgSteps">0</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">
                <span>当日数据</span>
                <span style="opacity: 0.8; font-size: 12px;" id="todayHint">--</span>
            </div>

            <div class="grid">
                <div class="stat">
                    <div class="stat-label">今日步数</div>
                    <div class="stat-value" id="todaySteps">--</div>
                </div>
                <div class="stat">
                    <div class="stat-label">运动时长</div>
                    <div class="stat-value muted" id="todayTime">--</div>
                </div>
                <div class="stat">
                    <div class="stat-label">今日减碳</div>
                    <div class="stat-value secondary" id="todayCarbon">--</div>
                </div>
                <div class="stat">
                    <div class="stat-label">设备在线</div>
                    <div class="stat-value muted" id="todayOnline">--</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">
                <span>按日期查看</span>
                <span style="opacity: 0.8; font-size: 12px;">活动小时分布</span>
            </div>

            <div class="row">
                <select class="select" id="dateSelect"></select>
            </div>

            <div class="grid" style="margin-bottom: 12px;">
                <div class="stat">
                    <div class="stat-label">步数</div>
                    <div class="stat-value" id="daySteps">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">时长</div>
                    <div class="stat-value muted" id="dayTime">0分</div>
                </div>
                <div class="stat">
                    <div class="stat-label">减碳</div>
                    <div class="stat-value secondary" id="dayCarbon">0g</div>
                </div>
                <div class="stat">
                    <div class="stat-label">活动小时数</div>
                    <div class="stat-value muted" id="dayHours">0小时</div>
                </div>
            </div>

            <div class="chart-wrap small">
                <canvas id="hoursChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const SERVER_URL = window.location.origin;
        const DEFAULT_RANGE_DAYS = 14;
        const DEFAULT_METRIC = 'step';

        let currentDays = DEFAULT_RANGE_DAYS;
        let currentMetric = DEFAULT_METRIC;
        let historyCache = {};
        let allHistoryCache = {};
        let trendChart = null;
        let hoursChart = null;

        function formatMinutes(seconds) {
            const min = Math.floor((Number(seconds) || 0) / 60);
            return `${min}分`;
        }

        function toNumber(value, fallback = 0) {
            const num = Number(value);
            return Number.isFinite(num) ? num : fallback;
        }

        function setActivePill(groupEl, attrName, attrValue) {
            groupEl.querySelectorAll('.pill').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute(attrName) === String(attrValue));
            });
        }

        function buildTrendSeries(sortedDates) {
            const labels = [];
            const steps = [];
            const minutes = [];
            const carbons = [];

            let totalSteps = 0;
            let totalTimeSec = 0;
            let totalCarbon = 0;
            let validDays = 0;

            sortedDates.forEach(date => {
                const data = historyCache[date] || {};
                labels.push(date.substring(5));

                const daySteps = toNumber(data.step, 0);
                const dayTimeSec = toNumber(data.sport_time, 0);
                const dayCarbon = toNumber(data.carbon_reduce, 0);

                steps.push(daySteps);
                minutes.push(Math.round(dayTimeSec / 60));
                carbons.push(Math.round(dayCarbon * 100) / 100);

                if (daySteps > 0 || dayTimeSec > 0 || dayCarbon > 0) {
                    validDays += 1;
                    totalSteps += daySteps;
                    totalTimeSec += dayTimeSec;
                    totalCarbon += dayCarbon;
                }
            });

            document.getElementById('sumSteps').textContent = totalSteps.toLocaleString();
            document.getElementById('sumTime').textContent = formatMinutes(totalTimeSec);
            document.getElementById('sumCarbon').textContent = `${Math.round(totalCarbon * 100) / 100}g`;
            document.getElementById('avgSteps').textContent = validDays > 0 ? Math.round(totalSteps / validDays).toLocaleString() : '0';

            return { labels, steps, minutes, carbons };
        }

        function getMetricConfig(metric) {
            if (metric === 'time') {
                return { label: '运动时长(分钟)', key: 'minutes', color: '#00ccff' };
            }
            if (metric === 'carbon') {
                return { label: '减碳(g)', key: 'carbons', color: '#2ecc71' };
            }
            return { label: '步数', key: 'steps', color: '#00ff88' };
        }

        function renderTrendChart(series) {
            const ctx = document.getElementById('trendChart');
            if (!ctx) return;

            const metricCfg = getMetricConfig(currentMetric);
            const data = series[metricCfg.key] || [];

            if (trendChart) {
                trendChart.destroy();
                trendChart = null;
            }

            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: series.labels,
                    datasets: [{
                        label: metricCfg.label,
                        data,
                        borderColor: metricCfg.color,
                        backgroundColor: 'rgba(255,255,255,0.06)',
                        borderWidth: 3,
                        pointRadius: 2,
                        pointHoverRadius: 4,
                        tension: 0.35,
                        fill: true,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.75)',
                            titleColor: '#fff',
                            bodyColor: '#fff',
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: 'rgba(255,255,255,0.85)' },
                            grid: { color: 'rgba(255,255,255,0.08)' }
                        },
                        y: {
                            ticks: { color: 'rgba(255,255,255,0.85)' },
                            grid: { color: 'rgba(255,255,255,0.08)' }
                        }
                    }
                }
            });
        }

        function renderHoursChart(activityHours) {
            const ctx = document.getElementById('hoursChart');
            if (!ctx) return;

            const hoursSet = new Set((activityHours || []).map(h => Number(h)));
            const labels = Array.from({ length: 24 }, (_, i) => `${i}`);
            const values = labels.map((_, idx) => hoursSet.has(idx) ? 1 : 0);

            if (hoursChart) {
                hoursChart.destroy();
                hoursChart = null;
            }

            hoursChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: '活动(1=有活动)',
                        data: values,
                        backgroundColor: 'rgba(0, 204, 255, 0.25)',
                        borderColor: 'rgba(0, 204, 255, 0.65)',
                        borderWidth: 1,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: {
                            ticks: { color: 'rgba(255,255,255,0.85)' },
                            grid: { display: false }
                        },
                        y: {
                            suggestedMin: 0,
                            suggestedMax: 1,
                            ticks: { stepSize: 1, color: 'rgba(255,255,255,0.85)' },
                            grid: { color: 'rgba(255,255,255,0.08)' }
                        }
                    }
                }
            });
        }

        function updateDateSelect(sortedDates) {
            const select = document.getElementById('dateSelect');
            if (!select) return;

            const previousValue = select.value;
            select.innerHTML = '';
            if (!sortedDates.length) {
                renderDayDetail('');
                return;
            }

            sortedDates.slice().reverse().forEach(date => {
                const option = document.createElement('option');
                option.value = date;
                option.textContent = date;
                select.appendChild(option);
            });

            select.onchange = () => renderDayDetail(select.value);

            const todayStr = new Date().toISOString().slice(0, 10);
            if (previousValue && sortedDates.includes(previousValue)) {
                select.value = previousValue;
            } else if (sortedDates.includes(todayStr)) {
                select.value = todayStr;
            }

            renderDayDetail(select.value);
        }

        function renderDayDetail(date) {
            const source = Object.keys(allHistoryCache).length ? allHistoryCache : historyCache;
            const data = source[date] || {};
            const steps = toNumber(data.step, 0);
            const timeSec = toNumber(data.sport_time, 0);
            const carbon = Math.round(toNumber(data.carbon_reduce, 0) * 100) / 100;
            const hours = Array.isArray(data.activity_hours) ? data.activity_hours : [];

            document.getElementById('daySteps').textContent = steps.toLocaleString();
            document.getElementById('dayTime').textContent = formatMinutes(timeSec);
            document.getElementById('dayCarbon').textContent = `${carbon}g`;
            document.getElementById('dayHours').textContent = `${hours.length}小时`;

            renderHoursChart(hours);
        }

        async function loadAllHistory() {
            const response = await fetch(`${SERVER_URL}/api/history?all=1`);
            allHistoryCache = await response.json();

            const fallbackDates = Object.keys(historyCache);
            const sortedDates = Object.keys(allHistoryCache).length
                ? Object.keys(allHistoryCache).sort()
                : fallbackDates.sort();

            updateDateSelect(sortedDates);
        }

        async function loadHistory(days) {
            currentDays = days;
            document.getElementById('rangeHint').textContent = `最近${days}天`;

            const response = await fetch(`${SERVER_URL}/api/history?days=${days}`);
            historyCache = await response.json();

            const sortedDates = Object.keys(historyCache).sort();
            const series = buildTrendSeries(sortedDates);
            renderTrendChart(series);
        }

        async function loadToday() {
            try {
                const response = await fetch(`${SERVER_URL}/api/status`);
                const data = await response.json();

                document.getElementById('todayHint').textContent = data.last_update || '--';
                document.getElementById('todaySteps').textContent = (toNumber(data.step, 0)).toLocaleString();
                document.getElementById('todayTime').textContent = formatMinutes(toNumber(data.sport_time_today, 0));
                document.getElementById('todayCarbon').textContent = `${Math.round(toNumber(data.carbon_reduce, 0) * 100) / 100}g`;
                document.getElementById('todayOnline').textContent = data.online ? '在线' : '离线';
            } catch (e) {
                document.getElementById('todayHint').textContent = '加载失败';
            }
        }

        async function refreshAll() {
            setActivePill(document.getElementById('rangeGroup'), 'data-days', currentDays);
            setActivePill(document.getElementById('metricGroup'), 'data-metric', currentMetric);

            await Promise.allSettled([loadHistory(currentDays)]);
            await Promise.allSettled([loadAllHistory(), loadToday()]);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const rangeGroup = document.getElementById('rangeGroup');
            const metricGroup = document.getElementById('metricGroup');

            rangeGroup.addEventListener('click', async (e) => {
                const btn = e.target.closest('.pill');
                if (!btn) return;
                const days = Number(btn.getAttribute('data-days'));
                if (!days || days === currentDays) return;

                setActivePill(rangeGroup, 'data-days', days);
                await loadHistory(days);
            });

            metricGroup.addEventListener('click', (e) => {
                const btn = e.target.closest('.pill');
                if (!btn) return;
                const metric = btn.getAttribute('data-metric');
                if (!metric || metric === currentMetric) return;
                currentMetric = metric;
                setActivePill(metricGroup, 'data-metric', metric);

                const sortedDates = Object.keys(historyCache).sort();
                const series = buildTrendSeries(sortedDates);
                renderTrendChart(series);
            });

            refreshAll();
            setInterval(loadToday, 3000);
        });
    </script>
</body>
</html>
